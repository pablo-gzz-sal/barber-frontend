<header
  class="fixed py-2 lg:py-0 top-0 left-0 w-full z-[110] bg-black/95 backdrop-blur-md text-white"
>
  <div class="max-w-9xl mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between">
    <!-- Left: Hours/Status (Desktop only) -->
    <div class="hidden lg:flex items-center gap-4 transition-all duration-300">
      <!-- Icon -->
      <button
        class="inline-flex items-center justify-center w-11 h-11 rounded-full border border-white/15 text-white hover:bg-white hover:text-black transition-all duration-300"
        (click)="loginWithShopify()"
        aria-label="Account"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path d="M20 21a8 8 0 0 0-16 0" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>

      <button
        type="button"
        aria-label="Open search"
        class="inline-flex items-center justify-center w-11 h-11 rounded-full border border-white/15 text-white hover:bg-white hover:text-black transition-all duration-300"
        (click)="search.open()"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
          />
        </svg>
      </button>

      <!-- Time + Open -->
      <div class="flex flex-col text-[11px] font-light tracking-wide leading-tight">
        <div class="flex items-center gap-2 text-white/80">
          <!-- clock -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>

          <span>{{ content.header.hours }}</span>
        </div>

        <div class="flex items-center gap-2 mt-1">
          <span class="w-1.5 h-1.5 rounded-full bg-purple-500 animate-pulse"></span>
          <span class="text-purple-400 font-medium">{{ content.header.openStatus }}</span>
        </div>
      </div>
    </div>

    <!-- Mobile Left: Menu Icon (scissors) -->
    <div>
      <button
        class="cursor-pointer lg:hidden p-2 md:p-2.5 hover:bg-white/5 transition-all duration-300 relative"
        aria-label="Cart"
        (click)="onCart()"
      >
        <!-- icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>

        <!-- badge -->
        <span
          class="absolute -top-0.5 -right-0.5 w-4 h-4 text-[9px] bg-white text-black rounded-full flex items-center justify-center font-medium"
          *ngIf="cartCount() > 0"
        >
          {{ cartCount() }}
        </span>
      </button>
      <button
        [class.opacity-0]="!isMenuOpen"
        [class.pointer-events-none]="!isMenuOpen"
        type="button"
        aria-label="Open search"
        class="inline-flex lg:hidden items-center justify-center w-11 h-11 ml-2 rounded-full border border-white/15 text-white hover:bg-white hover:text-black transition-all duration-300"
        (click)="search.open()"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
          />
        </svg>
      </button>
    </div>

    <!-- Center: Logo -->
    <div class="cursor-pointer absolute left-1/2 -translate-x-1/2">
      <a href="/" class="flex flex-col items-center group cursor-pointer">
        <img src="assets/svg/whiteLogo.svg" class="h-14 my-2" alt="" />
      </a>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-2 md:gap-3">
      <!-- Book Appointment Button (Desktop) -->
      <button
        class="cursor-pointer hidden lg:flex items-center gap-2 border border-white/30 px-4 md:px-6 py-2 md:py-2.5 rounded-full text-xs tracking-wide hover:bg-white hover:text-black transition-all duration-300"
        (click)="onBook()"
      >
        <svg
          width="17"
          height="13"
          viewBox="0 0 26 23"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M19.7167 0V1.94451H23.0998C24.6924 1.94451 26 3.23027 26 4.79728V7.30535H1.90735e-06V4.79728C1.90735e-06 3.2313 1.31086 1.94451 2.90351 1.94451H6.28218V0H7.98769V1.94451H18.01V0H19.7167ZM26 8.98356V20.1472C26 21.7132 24.6924 23 23.0998 23H2.90461C1.31199 23 0.00110245 21.7142 0.00110245 20.1472V8.98356H26ZM14.612 10.7726H11.3891V13.9288H14.612V10.7726ZM8.16628 10.7726H4.94343V13.9288H8.16628V10.7726ZM21.0577 16.1471H17.8348V19.3023H21.0577V16.1471ZM14.612 16.1471H11.3891V19.3023H14.612V16.1471ZM8.16628 16.1471H4.94343V19.3023H8.16628V16.1471Z"
            fill="currentColor"
          />
        </svg>

        <span class="font-semibold hover:font-semibold">{{ content.header.btnBook }}</span>
      </button>

      <!-- Cart Icon -->
      <button
        class="cursor-pointer hidden lg:inline-flex items-center justify-center relative h-10 min-w-[44px] rounded-full border border-white/30 text-white transition-all duration-300 ease-out hover:bg-white hover:text-black hover:border-white"
        aria-label="Cart"
        (click)="onCart()"
      >
        <!-- subtle inner glow -->
        <span
          class="pointer-events-none absolute inset-0 rounded-full bg-gradient-to-b from-white/10 via-white/[0.03] to-transparent"
        ></span>

        <!-- icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          class="relative z-10 transition-transform duration-300 group-hover:scale-105"
        >
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>

        <!-- badge -->
        <span
          *ngIf="cartCount() > 0"
          class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-white text-black text-[10px] leading-none font-medium flex items-center justify-center shadow-[0_4px_14px_rgba(0,0,0,0.18)]"
        >
          {{ cartCount() }}
        </span>
      </button>

      <!-- Desktop: Menu Dropdown Button + Panel -->
      <div class="relative hidden lg:block">
        <button
          type="button"
          (click)="toggleDesktopDropdown()"
          [class.open]="isDesktopDropdownOpen"
          class="menu-btn cursor-pointer hidden lg:flex items-center justify-center border border-white/30 px-2 md:px-2.5 py-2 md:py-2.5 rounded-full text-xs tracking-[0.18em] uppercase hover:bg-white hover:text-black transition-all duration-300"
          aria-haspopup="menu"
        >
          <span class="icon-wrap">
            <!-- grid -->
            <svg
              class="grid-icon"
              width="22"
              height="21"
              viewBox="0 0 28 27"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect width="6.5" height="6.5" rx="1" />
              <rect x="10.5" width="6.5" height="6.5" rx="1" />
              <rect x="21" width="6.5" height="6.5" rx="1" />
              <rect y="10.1665" width="6.5" height="6.5" rx="1" />
              <rect x="10.5" y="10.1665" width="6.5" height="6.5" rx="1" />
              <rect x="21" y="10.1665" width="6.5" height="6.5" rx="1" />
              <rect y="20.3335" width="6.5" height="6.5" rx="1" />
              <rect x="10.5" y="20.3335" width="6.5" height="6.5" rx="1" />
              <rect x="21" y="20.3335" width="6.5" height="6.5" rx="1" />
            </svg>

            <!-- x -->
            <span class="x-icon">
              <span class="x-line x-line-1"></span>
              <span class="x-line x-line-2"></span>
            </span>
          </span>
        </button>
      </div>

      <!-- Account Icon -->

      <!-- Mobile Right: Grid/Hamburger Icon -->
      <button
        type="button"
        (click)="toggleMenu()"
        [class.open]="isMenuOpen"
        class="menu-btn cursor-pointer lg:hidden flex items-center justify-center border border-white/30 px-2 md:px-2.5 py-2 md:py-2.5 rounded-full text-xs tracking-[0.18em] uppercase hover:bg-white hover:text-black transition-all duration-300"
        aria-haspopup="menu"
      >
        <span class="icon-wrap">
          <!-- grid -->
          <svg
            class="grid-icon"
            width="22"
            height="21"
            viewBox="0 0 28 27"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="6.5" height="6.5" rx="1" />
            <rect x="10.5" width="6.5" height="6.5" rx="1" />
            <rect x="21" width="6.5" height="6.5" rx="1" />
            <rect y="10.1665" width="6.5" height="6.5" rx="1" />
            <rect x="10.5" y="10.1665" width="6.5" height="6.5" rx="1" />
            <rect x="21" y="10.1665" width="6.5" height="6.5" rx="1" />
            <rect y="20.3335" width="6.5" height="6.5" rx="1" />
            <rect x="10.5" y="20.3335" width="6.5" height="6.5" rx="1" />
            <rect x="21" y="20.3335" width="6.5" height="6.5" rx="1" />
          </svg>

          <!-- x -->
          <span class="x-icon">
            <span class="x-line x-line-1"></span>
            <span class="x-line x-line-2"></span>
          </span>
        </span>
      </button>
    </div>
  </div>
</header>

<!-- Desktop Menu Overlay - FULLSCREEN -->
<div
  *ngIf="isDesktopDropdownOpen || isClosing"
  class="desktop-menu-overlay fixed inset-0 z-[100]"
  [class.closing]="isClosing"
  style="margin-top: 0 !important"
>
  <div class="desktop-menu-panel h-screen grid grid-cols-12 pt-20">
    <div class="col-span-5 px-12 py-16 flex flex-col bg-black justify-center desktop-menu-nav">
      <div class="space-y-1">
        <ng-container *ngFor="let item of menuItems; let i = index">
          <button
            type="button"
            class="my-3 cursor-pointer menu-stagger-item w-full text-left flex items-center justify-between py-2 text-6xl tracking-wide transition-all duration-300 text-white/30 hover:text-white menu-item-hover leading-[60px] tracking-[2.89px]"
            [class.text-white]="isRouteActive(item.route) || i === activePreviewIndex"
            [class.menu-item-active]="isRouteActive(item.route)"
            (mouseenter)="setPreview(i)"
            (focus)="setPreview(i)"
            (click)="navigateTo(item.route)"
          >
            <span class="font-thin">{{ item.label }}</span>
          </button>
        </ng-container>
      </div>
    </div>

    <div class="col-span-7 relative desktop-menu-preview">
      <div class="absolute inset-0">
        <img
          [src]="menuItems[activePreviewIndex]?.preview"
          alt="Menu preview"
          class="h-full w-full object-cover grayscale transition-opacity duration-500 ease-out"
        />
        <div class="absolute inset-0 bg-black/10"></div>
      </div>

      <div class="relative h-full p-12 flex items-end">
        <div class="text-white/60 text-xs tracking-[0.35em] uppercase animate-label">Preview</div>
      </div>
    </div>
  </div>
</div>

<!-- Mobile Menu Overlay - FULLSCREEN -->
<div *ngIf="isMenuOpen" class="lg:hidden fixed inset-0 z-[100]">
  <!-- overlay -->
  <div class="absolute inset-0 bg-black/88 backdrop-blur-[6px]" (click)="toggleMenu()"></div>

  <!-- panel -->
  <div class="relative h-dvh flex flex-col pt-16 md:pt-20 px-6 pb-8 text-white animate-mobile-menu">
    <!-- top utility row -->
    <!-- <div class="flex items-center justify-end mt-8">

      >

        <span

          {{ cartCount() }}
        </span>
      </button>
    </div> -->

    <!-- nav -->
    <div *ngIf="isMenuOpen" class="lg:hidden fixed inset-0 z-[100]">
      <!-- overlay -->
      <div class="absolute inset-0 bg-black/88 backdrop-blur-[6px]" (click)="toggleMenu()"></div>

      <!-- panel -->
      <div
        class="relative h-dvh flex flex-col pt-24 md:pt-20 px-6 pb-8 text-white animate-mobile-menu"
      >
        <!-- nav -->
        <nav class="flex-1 flex flex-col justify-between min-h-0 overflow-hidden">
          <div class="overflow-y-auto">
            <div class="space-y-3 overflow-hidden">
              <ng-container *ngFor="let item of menuItems; let i = index">
                <button
                  type="button"
                  class="menu-stagger-item mobile-menu-link leading-9 tracking-widest text-5xl"
                  [class.mobile-menu-link-active]="
                    isRouteActive(item.route) || i === activePreviewIndex
                  "
                  (mouseenter)="setPreview(i)"
                  (click)="setPreview(i); navigateTo(item.route)"
                >
                  {{ item.label }}
                </button>
              </ng-container>
            </div>
          </div>

          <!-- action items -->
          <div
            class="mt-8 pt-6 border-t border-white/10 space-y-3 animate-button-fade flex justify-between"
          >
            <div class="">
              <button type="button" (click)="onBook()" class="mobile-menu-link mobile-menu-action">
                {{ content.header.btnBook }}
              </button>

              <button
                type="button"
                (click)="loginWithShopify(); toggleMenu()"
                class="mobile-menu-link mobile-menu-action"
              >
                Shop Account
              </button>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </div>
</div>
