<header class="fixed top-0 left-0 w-full z-[110] bg-black/95 backdrop-blur-md text-white">
  <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between">
    <!-- Left: Hours/Status (Desktop only) -->
    <!-- Left: Hours/Status (Desktop only) -->
    <div
      class="hidden lg:flex items-center gap-4 transition-all duration-300"
      [class.opacity-0]="isDesktopDropdownOpen"
      [class.pointer-events-none]="isDesktopDropdownOpen"
    >
      <!-- Icon -->
      <div class="w-11 h-11 rounded-full border border-white/15 flex items-center justify-center">
        <img src="assets/svg/scissors.svg" class="h-6 w-auto" alt="Logo" />
      </div>

      <app-search-overlay
        [class.opacity-0]="isDesktopDropdownOpen || isMenuOpen"
        [class.pointer-events-none]="isDesktopDropdownOpen || isMenuOpen"
      ></app-search-overlay>

      <!-- Time + Open -->
      <div class="flex flex-col text-[11px] font-light tracking-wide leading-tight">
        <div class="flex items-center gap-2 text-white/80">
          <!-- clock -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>

          <span>{{ content.header.hours }}</span>
        </div>

        <div class="flex items-center gap-2 mt-1">
          <span class="w-1.5 h-1.5 rounded-full bg-purple-500 animate-pulse"></span>
          <span class="text-purple-400 font-medium">{{ content.header.openStatus }}</span>
        </div>
      </div>
    </div>

    <!-- Mobile Left: Menu Icon (scissors) -->
    <button
      class="cursor-pointer lg:hidden p-2 md:p-2.5 hover:bg-white/5 transition-all duration-300 relative"
      aria-label="Cart"
      [class.opacity-0]="isDesktopDropdownOpen || isMenuOpen"
      [class.pointer-events-none]="isDesktopDropdownOpen || isMenuOpen"
      (click)="onCart()"
    >
      <!-- icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>

      <!-- badge -->
      <span
        class="absolute -top-0.5 -right-0.5 w-4 h-4 text-[9px] bg-white text-black rounded-full flex items-center justify-center font-medium"
        *ngIf="cartCount() > 0"
      >
        {{ cartCount() }}
      </span>
    </button>

    <!-- Center: Logo -->
    <div class="cursor-pointer absolute left-1/2 -translate-x-1/2">
      <a href="/" class="flex flex-col items-center group cursor-pointer">
        <img src="assets/svg/whiteLogo.svg" class="h-14 my-2" alt="" />
      </a>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-2 md:gap-3">
      <!-- Book Appointment Button (Desktop) -->
      <button
        class="cursor-pointer hidden lg:flex items-center gap-2 border border-white/30 px-4 md:px-6 py-2 md:py-2.5 rounded-full text-xs tracking-wide hover:bg-white hover:text-black transition-all duration-300"
        [class.opacity-0]="isDesktopDropdownOpen"
        [class.pointer-events-none]="isDesktopDropdownOpen"
        (click)="onBook()"
      >
        <svg
          width="17"
          height="13"
          viewBox="0 0 26 23"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M19.7167 0V1.94451H23.0998C24.6924 1.94451 26 3.23027 26 4.79728V7.30535H1.90735e-06V4.79728C1.90735e-06 3.2313 1.31086 1.94451 2.90351 1.94451H6.28218V0H7.98769V1.94451H18.01V0H19.7167ZM26 8.98356V20.1472C26 21.7132 24.6924 23 23.0998 23H2.90461C1.31199 23 0.00110245 21.7142 0.00110245 20.1472V8.98356H26ZM14.612 10.7726H11.3891V13.9288H14.612V10.7726ZM8.16628 10.7726H4.94343V13.9288H8.16628V10.7726ZM21.0577 16.1471H17.8348V19.3023H21.0577V16.1471ZM14.612 16.1471H11.3891V19.3023H14.612V16.1471ZM8.16628 16.1471H4.94343V19.3023H8.16628V16.1471Z"
            fill="currentColor"
          />
        </svg>

        <span class="font-semibold hover:font-semibold">{{ content.header.btnBook }}</span>
      </button>

      <!-- Cart Icon -->
      <button
        class="cursor-pointer hidden lg:inline-flex items-center justify-center relative h-10 min-w-[44px] rounded-full border border-white/30 text-white transition-all duration-300 ease-out hover:bg-white hover:text-black hover:border-white"
        aria-label="Cart"
        [class.opacity-0]="isDesktopDropdownOpen || isMenuOpen"
        [class.pointer-events-none]="isDesktopDropdownOpen || isMenuOpen"
        (click)="onCart()"
      >
        <!-- subtle inner glow -->
        <span
          class="pointer-events-none absolute inset-0 rounded-full bg-gradient-to-b from-white/10 via-white/[0.03] to-transparent"
        ></span>

        <!-- icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="19"
          height="19"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          class="relative z-10 transition-transform duration-300 group-hover:scale-105"
        >
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>

        <!-- badge -->
        <span
          *ngIf="cartCount() > 0"
          class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-white text-black text-[10px] leading-none font-medium flex items-center justify-center shadow-[0_4px_14px_rgba(0,0,0,0.18)]"
        >
          {{ cartCount() }}
        </span>
      </button>

      <!-- Desktop: Menu Dropdown Button + Panel -->
      <div class="relative hidden lg:block">
        <button
          type="button"
          class="cursor-pointer hidden lg:flex hover:text-black items-center gap-2 border border-white/30 px-2 md:px-2.5 py-2 md:py-2.5 rounded-full text-xs tracking-[0.18em] uppercase hover:bg-white hover:text-black transition-all duration-300"
          (click)="toggleDesktopDropdown()"
          aria-haspopup="menu"
        >
          <svg
            width="22"
            height="21"
            viewBox="0 0 28 27"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect x="10.5" width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect x="21" width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect y="10.1665" width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect x="10.5" y="10.1665" width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect x="21" y="10.1665" width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect y="20.3335" width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect x="10.5" y="20.3335" width="6.5" height="6.5" rx="1" fill="currentColor" />
            <rect x="21" y="20.3335" width="6.5" height="6.5" rx="1" fill="currentColor" />
          </svg>
        </button>
      </div>

      <!-- Account Icon -->
      <button
        class="h-10 cursor-pointer hidden lg:flex items-center gap-2 border border-white/30 px-2 md:px-2.5 py-2 md:py-2.5 rounded-full text-xs tracking-[0.18em] uppercase hover:bg-white hover:text-black transition-all duration-300"
        (click)="loginWithShopify()"
        aria-label="Account"
        [class.opacity-0]="isDesktopDropdownOpen || isMenuOpen"
        [class.pointer-events-none]="isDesktopDropdownOpen || isMenuOpen"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path d="M20 21a8 8 0 0 0-16 0" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>

      <!-- Mobile Right: Grid/Hamburger Icon -->
      <button
        type="button"
        class="cursor-pointer lg:hidden items-center gap-2 px-2 md:px-2.5 py-2 md:py-2.5 rounded-full text-xs tracking-[0.18em] uppercase hover:bg-white hover:text-black transition-all duration-300"
        (click)="toggleMenu()"
        aria-label="Open menu"
      >
        <svg
          width="22"
            height="21"
          viewBox="0 0 28 27"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect x="10.5" width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect x="21" width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect y="10.1665" width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect x="10.5" y="10.1665" width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect x="21" y="10.1665" width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect y="20.3335" width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect x="10.5" y="20.3335" width="6.5" height="6.5" rx="1" fill="currentColor" />
          <rect x="21" y="20.3335" width="6.5" height="6.5" rx="1" fill="currentColor" />
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Desktop Menu Overlay - FULLSCREEN -->
<div
  *ngIf="isDesktopDropdownOpen"
  class="fixed left-0 right-0 top-0 bottom-0 bg-[#000000] z-[100] animate-menu-slide-down"
  style="margin-top: 0 !important"
>
  <div class="h-[100vh] grid grid-cols-12 pt-20">
    <!-- Left: Navigation Options -->
    <div class="col-span-5 px-12 py-16 flex flex-col bg-[#000000] justify-center">
      <div class="space-y-1">
        <ng-container *ngFor="let item of menuItems; let i = index">
          <button
            type="button"
            class="cursor-pointer menu-stagger-item w-full text-left flex items-center justify-between py-3 text-5xl font-light tracking-wide transition-all duration-300 text-white/30 hover:text-white menu-item-hover"
            [class.text-white]="i === activePreviewIndex"
            (mouseenter)="setPreview(i)"
            (focus)="setPreview(i)"
            (click)="navigateTo(item.route)"
          >
            <span>{{ item.label }}</span>
            <span
              class="cursor-pointer hover:text-white text-2xl text-white/50 transition-all duration-300"
              [class.opacity-100]="i === activePreviewIndex"
              [class.opacity-0]="i !== activePreviewIndex"
            >
              ↗
            </span>
          </button>
        </ng-container>
      </div>
    </div>

    <!-- Right: Preview Image -->
    <div class="col-span-7 relative animate-image-slide-in">
      <div class="absolute inset-0">
        <img
          [src]="menuItems[activePreviewIndex]?.preview"
          alt="Menu preview"
          class="h-full w-full object-cover grayscale transition-opacity duration-500 ease-out"
        />
        <div class="absolute inset-0"></div>
      </div>

      <div class="relative h-full p-12 flex items-end">
        <div class="text-white/60 text-xs tracking-[0.35em] uppercase animate-label">Preview</div>
      </div>
    </div>
  </div>
</div>

<!-- Mobile Menu Overlay - FULLSCREEN -->
<div
  *ngIf="isMenuOpen"
  class="lg:hidden fixed left-0 right-0 top-0 bottom-0 bg-black z-[100] overflow-hidden animate-mobile-menu"
  style="margin-top: 0 !important"
>
  <div class="h-[100vh] grid grid-rows-[auto_1fr] pt-16 md:pt-20">
    <!-- Mobile Navigation -->
    <nav class="px-6 py-8 flex flex-col justify-center overflow-y-auto">
      <div class="space-y-4">
        <ng-container *ngFor="let item of menuItems; let i = index">
          <button
            type="button"
            class="menu-stagger-item text-left text-4xl font-light tracking-wide transition-all duration-300 text-white/30 hover:text-white block w-full menu-item-hover"
            [class.text-white]="i === activePreviewIndex"
            (mouseenter)="setPreview(i)"
            (click)="setPreview(i); navigateTo(item.route)"
          >
            {{ item.label }}
          </button>
        </ng-container>
      </div>
      <!-- Mobile Action Buttons -->
      <!-- Mobile Action Buttons -->
      <div class="mt-10 space-y-4 animate-button-fade">
        <button
          (click)="onBook()"
          class="uppercase w-full text-left text-lg font-light tracking-wide text-white/80 border border-white/20 rounded-full px-6 py-4 transition-all duration-300 hover:text-black hover:bg-white hover:border-white"
        >
          {{ content.header.btnBook }}
        </button>

        <button
          (click)="loginWithShopify(); toggleMenu()"
          class="uppercase w-full text-left text-lg font-light tracking-wide text-white/80 border border-white/20 rounded-full px-6 py-4 transition-all duration-300 hover:text-black hover:bg-white hover:border-white"
        >
          Shop Account
        </button>
      </div>
    </nav>
  </div>
</div>
