<section class="relative w-full min-h-screen bg-gray-900 text-white overflow-hidden lg:hidden">
  <!-- Background Image -->
  <div class="inset-0 left-[-296px] top-[-16px] absolute">
    <img
      src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/hairKinetics.png?v=1773360123"
      alt="Hair Kinetics Background"
      class="w-full h-full object-cover object-left lg:object-center"
    />
    <!-- Gradient Overlay -->
    <!-- <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70"></div> -->
  </div>

  <!-- Content -->
  <div class="relative z-10 min-h-screen flex items-center px-6 py-20">
    <div class="w-full max-w-6xl mx-auto">
      <!-- Right Side: Large Title -->
      <div class="text-left mb-16 animate-fade-in">
        <h2
          class="text-6xl sm:text-7xl md:text-8xl font-thin tracking-[0.2em] leading-none text-white"
        >
          HAIR<br />KINETICS<sup class="text-2xl md:text-3xl">™</sup>
        </h2>
      </div>

      <!-- Left Side: Features with Icons -->
      <div
        class="relative z-10 min-h-screen flex items-center justify-between px-12 xl:px-20 max-w-[1800px] mx-auto"
      >
        <!-- Left Side: Infinite Scrolling Features - Full Height -->
        <div
          class="absolute left-4 top-0 bottom-0 w-full lg:max-w-6/12 overflow-hidden"
        >
          <!-- Scrolling container -->
          <div
            class="flex flex-col gap-16 py-16 animate-vertical-loop"
            [style.transform]="'translateY(-' + scrollPosition + 'px)'"
            style="will-change: transform"
          >
            <div
              *ngFor="let feature of duplicatedFeatures; let i = index"
              class="flex flex-col gap-4 w-6/12"
              [class.ml-auto]="i % 2 !== 0"
            >
              <!-- Icon -->
              <div class="w-12 h-12 text-white" [innerHTML]="feature.safeIcon"></div>

              <!-- Text -->
              <p
                class="text-[16px] font-light leading-relaxed text-white/80 leading-8 tracking-[2.89px]"
              >
                {{ feature.desc }}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Version 2: Desktop with Background Image -->
<section class="hidden lg:block relative w-full min-h-screen text-white overflow-hidden">
  <!-- Background Image -->
  <div class="absolute inset-0">
    <img
      src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/hairKinetics.png?v=1773360123"
      alt="Hair Kinetics Background"
      class="w-full h-full object-cover"
    />
    <!-- Overlay -->
    <!-- <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-black/40 to-black/70"></div> -->
  </div>

  <!-- Content -->
  <div
    class="relative z-10 min-h-screen flex items-center justify-between px-12 xl:px-20 max-w-[1800px] mx-auto"
  >
    <!-- Left Side: Infinite Scrolling Features - Full Height -->
    <div class="absolute left-12 xl:left-20 top-0 bottom-0 w-full lg:max-w-6/12 overflow-hidden">
      <!-- Scrolling container -->
      <div
        class="flex flex-col gap-28 py-32 animate-vertical-loop"
        [style.transform]="'translateY(-' + scrollPosition + 'px)'"
        style="will-change: transform"
      >
        <div
          *ngFor="let feature of duplicatedFeatures; let i = index"
          class="flex flex-col gap-4 w-6/12"
          [class.ml-auto]="i % 2 !== 0"
        >
          <!-- Icon -->
          <div class="w-12 h-12 text-white" [innerHTML]="feature.safeIcon"></div>

          <!-- Text -->
          <p
            class="text-[16px] font-light leading-relaxed text-white/80 leading-8 tracking-[2.89px]"
          >
            {{ feature.desc }}
          </p>
        </div>
      </div>
    </div>

    <!-- Right Side: Large Title -->
    <div class="absolute top-16 right-16 xl:right-24 z-20 text-right">
      <h2
        class="text-7xl text-left xl:text-8xl font-extralight tracking-[0.2em] leading-tight text-white"
      >
        HAIR<br />KINETICS<sup class="text-3xl xl:text-4xl align-super">™</sup>
      </h2>
    </div>
  </div>

  <!-- Optional subtle tint -->
  <div
    class="absolute inset-0 bg-gradient-to-br from-blue-950/10 via-transparent to-purple-950/10 pointer-events-none"
  ></div>
</section>
