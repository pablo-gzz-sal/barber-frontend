<section class="w-full bg-black text-white overflow-hidden">
  <div class="grid grid-cols-1 lg:grid-cols-2 min-h-[483px]">
    <!-- Left: Image -->
    <div class="relative min-h-[260px] lg:min-h-full">
      <img
        src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/candleHero.png?v=1773360109"
        alt="BU LOVE Candle"
        class="absolute inset-0 w-full h-full object-cover object-center"
      />
    </div>

    <!-- Right: Content -->
    <div class="relative flex items-center">
      <!-- Watermark -->
      <div
        class="pointer-events-none absolute top-10 left-10 text-white/5 text-7xl md:text-8xl font-extralight tracking-[0.35em]"
      >
        MEET
      </div>

      <div class="relative z-10 w-full px-8 md:px-14 lg:px-16 py-14">
        <!-- Title -->
        <h2 class="text-4xl md:text-5xl font-light leading-tight leading-[60px] tracking-[2.89px]">
          Discover<br />
          <span class="font-normal">BU LOVE Candle</span>
        </h2>

        <!-- Description -->
        <p
          class="mt-6 max-w-md lg:pr-10 text-sm md:text-base font-light leading-relaxed text-white leading-8 tracking-[2.89px]"
        >
          Our signature candle born in a time of stillness, made to awaken connection.
        </p>

        <!-- CTA -->
        <div class="mt-10">
          <button
            (click)="onShop()"
            class="cursor-pointer group relative overflow-hidden px-4 py-3 leading-4 capitalize transition-all duration-300 ease-out bg-white text-black hover:bg-black border border-white hover:text-white rounded-[5px] text-base"
          >
            <span class="relative z-10">Shop Now</span>

            <!-- subtle glow -->
            <span
              class="absolute inset-0 rounded-full opacity-0 transition-opacity duration-300 bg-gradient-to-r from-transparent via-white/10 to-transparent"
            >
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="relative w-full overflow-hidden bg-black text-white">

  <!-- ===== MOBILE / TABLET (stacked) ===== -->
  <div class="lg:hidden flex flex-col">
    <!-- Image -->
    <div class="w-full">
      <img
        src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/JosephBannerImage.png?v=1774592131"
        alt="Joseph Battisti"
        class="w-full object-contain grayscale"
      />
    </div>

    <!-- Content below image -->
    <div class="px-6 py-12 sm:py-16 bg-white text-black">
      <div class="max-w-lg mx-auto sm:mx-0">
        <div class="font-extralight font-['Inter']">
          <h2 class="text-5xl sm:text-6xl font-extralight leading-tight tracking-[2.89px]">
            MEET
          </h2>
          <h2 class="text-5xl sm:text-6xl font-extralight leading-tight tracking-[2.89px] mt-3">
            JOSEPH
          </h2>
          <h2 class="text-5xl sm:text-6xl font-extralight leading-tight tracking-[2.89px] mt-3">
            BATTISTI
          </h2>
        </div>

        <p class="mt-8 text-sm sm:text-base font-light leading-relaxed max-w-md">
          {{ content.bio }}
        </p>

        <div class="mt-10 flex">
          <button
            (click)="onAbout()"
            class="cursor-pointer group relative overflow-hidden px-4 py-3 leading-4 capitalize transition-all duration-300 ease-out bg-black text-white hover:bg-transparent border border-black hover:text-black rounded-[5px] text-base"
          >
            {{ content.btnText }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== DESKTOP (overlay) ===== -->
  <div class="hidden lg:block">
    <!-- Background image -->
    <div class="absolute inset-0">
      <img
        src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/JosephBannerImage.png?v=1774592131"
        alt="Joseph Battisti"
        class="w-full h-full object-contain object-left grayscale"
      />
    </div>

    <!-- Invisible image for natural height -->
    <img
      src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/JosephBannerImage.png?v=1774592131"
      alt=""
      class="w-full invisible"
      aria-hidden="true"
    />

    <!-- Content overlaid on the right -->
    <div class="absolute inset-0 z-10 w-full px-6 py-32 pl-[70%]">
      <div class="flex items-center h-full">
        <div class="w-full max-w-lg">
          <div class="font-extralight font-['Inter'] text-black">
            <h2 class="text-8xl font-extralight leading-[60px] tracking-[2.89px]">
              MEET
            </h2>
            <h2 class="text-8xl font-extralight leading-[60px] tracking-[2.89px] mt-12">
              JOSEPH
            </h2>
            <h2 class="text-8xl font-extralight leading-[60px] tracking-[2.89px] mt-12">
              BATTISTI
            </h2>
          </div>

          <p class="mt-8 text-base font-light leading-relaxed text-black max-w-md">
            {{ content.bio }}
          </p>

          <div class="mt-10 flex">
            <button
              (click)="onAbout()"
              class="cursor-pointer group relative overflow-hidden px-4 py-3 leading-4 capitalize transition-all duration-300 ease-out bg-black text-white hover:bg-transparent border border-black hover:text-black rounded-[5px] text-base"
            >
              {{ content.btnText }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
