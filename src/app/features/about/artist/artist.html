<section class="w-full bg-black text-white overflow-hidden">
  <div class="grid grid-cols-1 lg:grid-cols-2 min-h-[483px]">
    <!-- Left: Image -->
    <div class="relative min-h-[260px] lg:min-h-full">
      <img
        src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/candleHero.png?v=1773360109"
        alt="BU LOVE Candle"
        class="absolute inset-0 w-full h-full object-cover object-center"
      />
    </div>

    <!-- Right: Content -->
    <div class="relative flex items-center">
      <!-- Watermark -->
      <div
        class="pointer-events-none absolute top-10 left-10 text-white/5 text-7xl md:text-8xl font-extralight tracking-[0.35em]"
      >
        MEET
      </div>

      <div class="relative z-10 w-full px-8 md:px-14 lg:px-16 py-14">
        <!-- Title -->
        <h2 class="text-4xl md:text-5xl font-light leading-tight leading-[60px] tracking-[2.89px]">
          Discover<br />
          <span class="font-normal">BU LOVE Candle</span>
        </h2>

        <!-- Description -->
        <p
          class="mt-6 max-w-md lg:pr-10 text-sm md:text-base font-light leading-relaxed text-white leading-8 tracking-[2.89px]"
        >
          Our signature candle born in a time of stillness, made to awaken connection.
        </p>

        <!-- CTA -->
        <div class="mt-10">
          <button
            (click)="onShop()"
            class="cursor-pointer group relative overflow-hidden bg-[#2a2a2a] text-white px-8 py-3 text-xs tracking-[0.25em] capitalize transition-all duration-300 ease-out rounded-lg"
          >
            <span class="relative z-10">Shop Now</span>

            <!-- subtle glow -->
            <span
              class="absolute inset-0 rounded-full opacity-0 transition-opacity duration-300 bg-gradient-to-r from-transparent via-white/10 to-transparent"
            >
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="relative w-full min-h-[70vh] lg:min-h-[80vh] overflow-hidden bg-black text-white">
  <!-- Background image -->
  <div class="absolute inset-0 left-[-296px] top-[-16px] absolute">
    <img
      src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/josephHeroCut.png?v=1773792821"
      alt="Joseph Battisti"
      class="w-full h-full object-cover object-left grayscale"
    />
  </div>

  <!-- Content -->
  <div class="relative z-10 w-full px-6 py-20 md:py-28 lg:py-32 lg:pl-[60%]">
    <div class="flex items-center min-h-[60vh] lg:min-h-[70vh]">
      <div class="w-full max-w-lg">
        <!-- Title -->
        <div class="font-extralight font-['Inter'] text-black">
          <h2
            class="text-5xl sm:text-6xl lg:text-8xl font-extralight leading-[60px] tracking-[2.89px]"
          >
            MEET
          </h2>
          <h2
            class="text-5xl sm:text-6xl lg:text-8xl font-extralight leading-[60px] tracking-[2.89px] mt-3 lg:mt-12"
          >
            JOSEPH
          </h2>
          <h2
            class="text-5xl sm:text-6xl lg:text-8xl font-extralight leading-[60px] tracking-[2.89px] mt-3 lg:mt-12"
          >
            BATTISTI
          </h2>
        </div>

        <!-- Bio -->
        <p class="mt-8 text-sm md:text-base font-light leading-relaxed text-black max-w-md">
          {{ content.bio }}
        </p>

        <!-- Button -->
        <div class="mt-10 flex">
          <button
            (click)="onAbout()"
            class="cursor-pointer group relative overflow-hidden bg-[#2a2a2a] text-white px-8 py-3 text-xs tracking-[0.25em] capitalize transition-all duration-300 ease-out rounded-lg"
          >
            {{ content.btnText }}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
