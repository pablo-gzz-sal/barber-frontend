<section class="bg-white text-black overflow-hidden">
  <!-- Top black quote bar -->
  <div class="bg-black text-white py-10 md:py-14">
    <div class="max-w-7xl mx-auto px-6 flex flex-col justify-center items-center text-center">
      <img class="w-40 h-24 py-4" src="assets/svg/allure-logo.svg" alt="">
      <p
      style="font-family: Inter, sans-serif"
        class="text-sm  md:text-lg font-medium text-white/80 max-w-3xl mx-auto  tracking-[2.89px]"
      >
        {{ content.quote }}
      </p>
    </div>
  </div>

  <!-- Main two-column block -->
<div class="w-full">
  <div class="flex flex-col lg:flex-row min-h-[400px] lg:min-h-[572px]">

    <!-- Left: image — exactly half -->
    <div class="w-full lg:w-1/2 relative overflow-hidden h-[300px] sm:h-[420px] lg:h-auto">
      <img
        [src]="content.images[0]"
        alt="Salon Interior Main"
        class="w-full h-full object-cover object-center"
      />
    </div>

    <!-- Right: content — exactly half -->
    <div class="w-full lg:w-1/2 flex items-center justify-start px-8 py-12 sm:px-12 md:px-16 lg:px-20 xl:px-24">
      <div class="w-full max-w-md flex flex-col px-10 items-start gap-6 md:gap-8">
        <h2
          class="self-stretch justify-start text-stone-950 text-6xl font-extralight font-['Inter'] lg:leading-[80px] tracking-[2.89px]"
        >
          {{ content.title }}
        </h2>

        <p
          class="text-stone-600 font-light tracking-[0.04em] text-sm leading-7 sm:text-base sm:leading-7 lg:text-lg lg:leading-8 tracking-[2.89px]"
        >
          {{ content.description }}
        </p>

        <button
          (click)="onAbout()"
          class="cursor-pointer group relative overflow-hidden bg-[#2a2a2a] text-white px-8 py-3 text-xs tracking-[0.25em] uppercase transition-all duration-300 ease-out focus:outline-none rounded-lg"
        >
          <span class="relative z-10">{{ content.btnText }}</span>
          <span
            class="absolute inset-0 rounded-full opacity-0 transition-opacity duration-300 bg-gradient-to-r from-transparent via-white/10 to-transparent"
          ></span>
        </button>
      </div>
    </div>

  </div>
</div>
</section>
