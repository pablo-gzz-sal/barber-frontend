<section class="relative h-screen w-full bg-black flex items-center justify-center overflow-hidden">
  <!-- Gradient Overlay -->
  <div class="absolute inset-0 bg-gradient-to-b from-black via-black/80 to-black/90 z-10"></div>

  <!-- Content -->
<div class="relative z-20 w-full px-8 md:px-4 md:text-center md:overflow-hidden" #heroText>
  <h1
    class="hero-line font-thin text-white tracking-[0.1em] leading-tight whitespace-normal md:whitespace-nowrap md:leading-none"
    style="font-size: clamp(3.5rem, 9.5vw, 14rem)"
  >
    {{ content.hero.line1 }}
  </h1>

  <h2
    class="hero-line font-thin text-white/40 tracking-[0.1em] leading-tight whitespace-normal md:whitespace-nowrap md:leading-none mt-2 md:mt-0"
    style="font-size: clamp(3rem, 7.6vw, 10rem)"
  >
    {{ content.hero.line2 }}
  </h2>
</div>
  <!-- Bottom gradient fade -->
  <div
    class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-black to-transparent z-10"
  ></div>
</section>
