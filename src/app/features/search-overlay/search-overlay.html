@if (search.isOpen()) {
  <div
    class="search-overlay-backdrop fixed inset-0 z-[999] bg-black/75 backdrop-blur-[2px] px-4 sm:px-6 lg:px-10"
    (click)="onBackdropClick($event)"
  >
    <div class="mx-auto max-w-4xl pt-20 sm:pt-24">
      <div
        class="rounded-[28px] bg-white text-black border border-black/10 shadow-[0_20px_60px_rgba(0,0,0,0.22)] overflow-hidden animate-fade-in-up"
      >
        <!-- Top bar -->
        <div class="flex items-center gap-3 border-b border-black/10 px-4 sm:px-6 py-4 bg-white">
          <div class="shrink-0 text-black/45">
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
              />
            </svg>
          </div>

          <input
            #searchInput
            type="text"
            [formControl]="searchControl"
            placeholder="Search products..."
            class="w-full bg-transparent outline-none text-sm sm:text-base text-black placeholder:text-black/40"
          />

          <button
            *ngIf="searchControl.value"
            type="button"
            class="text-black/45 hover:text-black transition-colors"
            (click)="clear()"
          >
            Clear
          </button>

          <button
            type="button"
            aria-label="Close search"
            class="ml-1 inline-flex items-center justify-center w-10 h-10 rounded-full hover:bg-black hover:text-white transition-all duration-300"
            (click)="close()"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <!-- Status -->
        <div class="px-4 sm:px-6 pt-4 text-sm text-black/50 bg-white">
          <ng-container *ngIf="searchControl.value.trim().length < 2">
            Type at least 2 characters to search
          </ng-container>

          <ng-container *ngIf="isLoading">
            Searching...
          </ng-container>

          <ng-container *ngIf="!isLoading && searchControl.value.trim().length >= 2">
            {{ results.length }} result{{ results.length === 1 ? '' : 's' }}
          </ng-container>
        </div>

        <!-- Results -->
        <div class="px-4 sm:px-6 py-5 max-h-[70vh] overflow-y-auto bg-white">
          <ng-container *ngIf="!isLoading && results.length > 0; else emptyState">
            <div class="divide-y divide-black/10">
              @for (product of results; track product.id) {
                <button
                  type="button"
                  class="group w-full text-left bg-white transition-colors duration-300 py-4 sm:py-5 hover:bg-black/[0.02]"
                  (click)="goToProduct(product.id)"
                >
                  <div class="flex items-center gap-4">
                    <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-xl bg-[#f8f8f8] overflow-hidden shrink-0 border border-black/5">
                      <img
                        [src]="product.imageUrl"
                        [alt]="product.title"
                        class="w-full h-full object-contain p-2 transition-transform duration-300 group-hover:scale-[1.03]"
                        loading="lazy"
                      />
                    </div>

                    <div class="min-w-0 flex-1">
                      <p class="text-black/45 text-xs sm:text-sm">
                        {{ product.vendor || 'Product' }}
                      </p>

                      <p class="text-black text-sm sm:text-base leading-6 truncate">
                        {{ product.title }}
                      </p>

                      <p class="text-black text-sm sm:text-base font-semibold mt-1">
                        {{ product.price }}
                      </p>
                    </div>

                    <div class="shrink-0 text-black/35 group-hover:text-black transition-colors">
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                      >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                      </svg>
                    </div>
                  </div>
                </button>
              }
            </div>
          </ng-container>

          <ng-template #emptyState>
            <div
              *ngIf="!isLoading && searchControl.value.trim().length >= 2"
              class="py-12 text-center"
            >
              <p class="text-black text-base">No products found</p>
              <p class="text-black/50 text-sm mt-2">
                Try another keyword
              </p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
}
