<!-- Trigger button -->
<button
  type="button"
  aria-label="Open search"
  class="inline-flex items-center justify-center w-11 h-11 rounded-full border border-white/15 text-white hover:bg-white hover:text-black transition-all duration-300"
  (click)="open()"
>
  <svg
    class="w-5 h-5"
    fill="none"
    stroke="currentColor"
    stroke-width="1.8"
    viewBox="0 0 24 24"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
    />
  </svg>
</button>

<!-- Overlay -->
@if (isOpen) {
  <div
    class="search-overlay-backdrop fixed inset-0 z-[999] bg-black/70 backdrop-blur-sm px-4 sm:px-6 lg:px-10"
    (click)="onBackdropClick($event)"
  >
    <div class="mx-auto max-w-4xl pt-20 sm:pt-24">
      <div
        class="rounded-[28px] bg-background text-text-primary shadow-luxury border border-white/10 overflow-hidden animate-fade-in-up"
      >
        <!-- Top bar -->
        <div class="flex items-center gap-3 border-b border-border px-4 sm:px-6 py-4">
          <div class="shrink-0 text-text-muted">
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
              />
            </svg>
          </div>

          <input
            #searchInput
            type="text"
            [formControl]="searchControl"
            placeholder="Search products..."
            class="w-full bg-transparent outline-none text-sm sm:text-base placeholder:text-text-muted"
          />

          <button
            *ngIf="searchControl.value"
            type="button"
            class="text-text-muted hover:text-text-primary transition-colors"
            (click)="clear()"
          >
            Clear
          </button>

          <button
            type="button"
            aria-label="Close search"
            class="ml-1 inline-flex items-center justify-center w-10 h-10 rounded-full hover:bg-primary hover:text-white transition-all duration-300"
            (click)="close()"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <!-- Status -->
        <div class="px-4 sm:px-6 pt-4 text-sm text-text-muted">
          <ng-container *ngIf="searchControl.value.trim().length < 2">
            Type at least 2 characters to search
          </ng-container>

          <ng-container *ngIf="isLoading">
            Searching...
          </ng-container>

          <ng-container *ngIf="!isLoading && searchControl.value.trim().length >= 2">
            {{ results.length }} result{{ results.length === 1 ? '' : 's' }}
          </ng-container>
        </div>

        <!-- Results -->
        <div class="px-4 sm:px-6 py-5 max-h-[70vh] overflow-y-auto">
          <ng-container *ngIf="!isLoading && results.length > 0; else emptyState">
            <div class="grid grid-cols-1 gap-3">
              @for (product of results; track product.id) {
                <button
                  type="button"
                  class="group w-full text-left rounded-2xl bg-secondary border border-transparent hover:border-primary/30 hover:shadow-soft transition-all duration-300 p-3 sm:p-4"
                  (click)="goToProduct(product.id)"
                >
                  <div class="flex items-center gap-4">
                    <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-xl bg-background overflow-hidden shrink-0">
                      <img
                        [src]="product.imageUrl"
                        [alt]="product.title"
                        class="w-full h-full object-contain p-2 transition-transform duration-300 group-hover:scale-[1.03]"
                        loading="lazy"
                      />
                    </div>

                    <div class="min-w-0 flex-1">
                      <p class="text-text-muted text-xs sm:text-sm">
                        {{ product.vendor || 'Product' }}
                      </p>

                      <p class="text-text-primary text-sm sm:text-base leading-6 truncate">
                        {{ product.title }}
                      </p>

                      <p class="text-text-primary text-sm sm:text-base font-bold mt-1">
                        {{ product.price }}
                      </p>
                    </div>

                    <div class="shrink-0 text-text-muted group-hover:text-text-primary transition-colors">
                      <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                      >
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                      </svg>
                    </div>
                  </div>
                </button>
              }
            </div>
          </ng-container>

          <ng-template #emptyState>
            <div
              *ngIf="!isLoading && searchControl.value.trim().length >= 2"
              class="py-12 text-center"
            >
              <p class="text-text-primary text-base">No products found</p>
              <p class="text-text-muted text-sm mt-2">
                Try another keyword
              </p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
}
