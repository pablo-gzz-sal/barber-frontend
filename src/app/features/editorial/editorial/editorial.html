<section class="py-16 md:py-24 lg:py-32 bg-white text-black overflow-hidden">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-start">
      <div class="lg:col-span-5 flex flex-col justify-between">
        <div class="mb-10 md:mb-12 animate-fade-in-up">
          <h2 class="text-stone-950 text-5xl md:text-6xl lg:text-8xl font-extralight mb-8">
            @for (word of content.title; track word) {
              <span class="block leading-[60px] tracking-[2.89px] my-10">
                <app-parallax-text
                  [text]="word"
                  mode="chars"
                  parallaxStrength="medium"
                  [scrub]="3"
                  startTrigger="top 95%"
                  endTrigger="top -20%"
                  style="--prt-dim: rgba(120, 120, 120, 0.25); --prt-lit: currentColor"
                />
              </span>
            }
          </h2>
        </div>
        <div
          class="group w-full lg:w-4/5 aspect-[3/4] animate-fade-in-left"
          style="animation-delay: 300ms"
        >
          <div class="relative h-full w-full overflow-hidden border border-black/10">
            <img
              src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/servicesHero.png?v=1773360132"
              alt="Professional Style"
              class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.04]"
            />

            <!-- soft depth overlay -->
            <div
              class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-gradient-to-t from-black/10 via-transparent to-transparent"
            ></div>
          </div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="lg:col-span-7 animate-fade-in-right" style="animation-delay: 200ms">
        <!-- Large Image -->
        <div class="mx-auto mb w-full sm:w-3/4 max-w-xl mb-6 group">
          <div class="relative aspect-[4/5] lg:aspect-[3/4] overflow-hidden border border-black/10">
            <img
              src="https://cdn.shopify.com/s/files/1/0573/6602/0281/files/servicesHairHero.jpg?v=1773360116"
              alt="Hair Extensions Detail"
              class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-[1.035]"
            />

            <!-- subtle vignette -->
            <div
              class="absolute inset-0 bg-gradient-to-b from-black/5 via-transparent to-black/10"
            ></div>

            <!-- tiny corner label (optional, premium detail) -->
          </div>
          <div class="max-w-lg">
            <div class="h-px w-14 bg-black/15 mb-4"></div>
            <p
              class="self-stretch justify-start text-stone-950 text-xl font-light font-['Inter'] leading-8 tracking-[2.89px]"
            >
              {{ content.caption }}
            </p>
          </div>
        </div>

        <!-- Caption -->
      </div>
    </div>
  </div>
</section>
